name: 部署 VitePress 到 GitHub Pages (gh-pages 分支)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建文档
        env:
          NODE_OPTIONS: --max_old_space_size=8192
        run: pnpm run build

      # 关键修复：确保 .nojekyll 文件存在（防止 GitHub Pages 忽略 _ 开头的 assets 文件夹）
      - name: 创建 .nojekyll 文件
        run: touch .vitepress/dist/.nojekyll

      - name: 部署到 gh-pages 分支
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .vitepress/dist
          clean: true                    # 每次清空旧文件，避免残留导致 404
          single-commit: true            # 可选：保持 gh-pages 分支只有一个 commit，更干净
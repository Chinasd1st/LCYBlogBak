name: Deploy VitePress to GitHub Pages

on:
  # 推送到 main 分支时自动部署（如果你的默认分支是 master，请改为 master）
  push:
    branches:
      - main

  # 允许在 Actions 页面手动触发部署
  workflow_dispatch:

# 设置 GitHub Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：同一时间只允许一个部署任务运行
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 完整历史记录（如果使用 lastUpdated 等功能建议保留）

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist          # VitePress 2.x 默认构建输出目录（你的项目结构下）

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4